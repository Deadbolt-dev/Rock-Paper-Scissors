<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold:   #f5c842;
      --red:    #e03c3c;
      --green:  #3ce08a;
      --dim:    #888;
      --bg:     #0a0a0f;
      --panel:  #11111a;
      --border: #222236;
      --text:   #e8e4d0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow-x: hidden;
    }

    /* ── ANIMATED BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(245,200,66,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(60,224,138,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(224,60,60,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,200,66,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,200,66,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
    }

    /* ══════════════════════════════
       LOGIN PAGE
    ══════════════════════════════ */
    #login-page { text-align: center; }

    .login-header {
      margin-bottom: 2rem;
    }

    .login-badge {
      display: inline-block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--gold);
      border: 1px solid rgba(245,200,66,0.3);
      border-radius: 2px;
      padding: 4px 12px;
      margin-bottom: 1rem;
    }

    .login-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 10vw, 72px);
      letter-spacing: 0.06em;
      color: #fff;
      line-height: 0.9;
      text-shadow: 0 0 40px rgba(245,200,66,0.3);
    }

    .login-title span { color: var(--gold); }

    .login-hands-preview {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 0;
      margin: 2rem 0;
      height: 90px;
    }
    .login-hands-preview .h-wrap {
      transition: transform 0.3s;
    }
    .login-hands-preview .h-wrap:nth-child(1) { transform: rotate(-12deg) translateX(10px); }
    .login-hands-preview .h-wrap:nth-child(2) { transform: translateY(-8px); z-index: 2; }
    .login-hands-preview .h-wrap:nth-child(3) { transform: rotate(12deg) translateX(-10px); }
    .login-hands-preview svg { width: 72px; height: 72px; }

    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: 2px solid var(--gold);
      border-radius: 4px;
      padding: 2rem;
      position: relative;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245,200,66,0.6), transparent);
    }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--dim);
      text-align: left;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .name-input {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 13px 16px;
      font-size: 16px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }
    .name-input::placeholder { color: #333; }
    .name-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245,200,66,0.1);
    }

    .start-btn {
      width: 100%;
      background: var(--gold);
      border: none;
      border-radius: 3px;
      padding: 14px;
      font-size: 16px;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.15em;
      color: #000;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .start-btn:hover {
      background: #ffd966;
      box-shadow: 0 0 20px rgba(245,200,66,0.4);
    }
    .start-btn:active { transform: scale(0.98); }

    .error-msg { font-size: 13px; color: var(--red); margin-top: 8px; min-height: 18px; }

    /* ══════════════════════════════
       GAME PAGE
    ══════════════════════════════ */
    #game-page { display: none; }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .g-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.1em;
      color: var(--gold);
    }

    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 5px 12px;
      font-size: 11px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--dim);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: var(--text); border-color: #444; }

    /* match pips */
    .match-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 8px;
    }
    .match-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--dim);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .pips {
      display: flex;
      gap: 5px;
    }
    .pip {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }
    .pip.won-p  { background: var(--green); border-color: var(--green); box-shadow: 0 0 8px rgba(60,224,138,0.6); }
    .pip.won-b  { background: var(--red);   border-color: var(--red);   box-shadow: 0 0 8px rgba(224,60,60,0.6); }

    .round-info {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--dim);
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Score strip */
    .score-strip {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 16px;
      margin-bottom: 1rem;
    }
    .s-side { text-align: center; }
    .s-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .s-val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; line-height: 1; color: #fff; }
    .s-sep { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--border); }

    /* Arena */
    .arena {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem 1rem;
      margin-bottom: 1rem;
      display: grid;
      grid-template-columns: 1fr 60px 1fr;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }
    .arena::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(245,200,66,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .a-side { text-align: center; }
    .a-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hand-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
    }
    .hand-wrap svg { width: 90px; height: 90px; }
    .bot-side .hand-wrap svg { transform: scaleX(-1); }

    .vs-col { text-align: center; }
    .vs-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--border);
      letter-spacing: 0.05em;
    }

    /* Result */
    .result-msg {
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.15em;
      min-height: 26px;
      margin-bottom: 1rem;
      color: var(--text);
      transition: color 0.3s;
    }
    .result-msg.win  { color: var(--green); text-shadow: 0 0 20px rgba(60,224,138,0.5); }
    .result-msg.lose { color: var(--red);   text-shadow: 0 0 20px rgba(224,60,60,0.4); }
    .result-msg.draw { color: var(--gold);  text-shadow: 0 0 20px rgba(245,200,66,0.3); }

    /* Choice buttons */
    .choices {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 1rem;
    }
    .choice-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
      font-family: 'Rajdhani', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .choice-btn::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--gold);
      transform: scaleX(0);
      transition: transform 0.2s;
    }
    .choice-btn:hover::before { transform: scaleX(1); }
    .choice-btn:hover {
      border-color: rgba(245,200,66,0.4);
      background: rgba(245,200,66,0.05);
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .choice-btn:active { transform: scale(0.95) translateY(0); }
    .choice-btn svg { width: 50px; height: 50px; }
    .choice-btn .c-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--dim);
      text-transform: uppercase;
    }
    .choice-btn:hover .c-name { color: var(--gold); }

    /* Reset */
    .reset-btn {
      display: block;
      margin: 0 auto;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 7px 20px;
      font-size: 11px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .reset-btn:hover { color: var(--red); border-color: rgba(224,60,60,0.4); }

    /* ══════════════════════════════
       OVERLAY — Match Winner
    ══════════════════════════════ */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
    }
    #overlay.show { display: flex; }

    .overlay-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: 3px solid var(--gold);
      border-radius: 6px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 340px;
      width: 90%;
      animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .ov-crown { font-size: 52px; margin-bottom: 0.5rem; line-height: 1; }
    .ov-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 0.08em;
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .ov-title.p-win  { color: var(--green); text-shadow: 0 0 30px rgba(60,224,138,0.5); }
    .ov-title.b-win  { color: var(--red);   text-shadow: 0 0 30px rgba(224,60,60,0.5); }
    .ov-sub {
      font-size: 14px;
      color: var(--dim);
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }
    .ov-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: #fff;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }
    .ov-btn {
      background: var(--gold);
      border: none;
      border-radius: 3px;
      padding: 12px 32px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 0.15em;
      color: #000;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .ov-btn:hover { background: #ffd966; box-shadow: 0 0 20px rgba(245,200,66,0.4); }

    /* ── Animations ── */
    .shake { animation: shake 0.5s ease; }
    @keyframes shake {
      0%,100% { transform: translateY(0) rotate(0deg); }
      15%      { transform: translateY(-12px) rotate(-10deg); }
      35%      { transform: translateY(8px) rotate(8deg); }
      55%      { transform: translateY(-8px) rotate(-6deg); }
      75%      { transform: translateY(5px) rotate(4deg); }
    }
    .bot-shake { animation: bshake 0.5s ease; }
    @keyframes bshake {
      0%,100% { transform: scaleX(-1) translateY(0) rotate(0deg); }
      15%      { transform: scaleX(-1) translateY(-12px) rotate(10deg); }
      35%      { transform: scaleX(-1) translateY(8px) rotate(-8deg); }
      55%      { transform: scaleX(-1) translateY(-8px) rotate(6deg); }
      75%      { transform: scaleX(-1) translateY(5px) rotate(-4deg); }
    }
    .reveal-pop { animation: revealPop 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
    @keyframes revealPop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .bot-reveal-pop { animation: botRevealPop 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
    @keyframes botRevealPop {
      from { transform: scaleX(-1) scale(0.5); opacity: 0; }
      to   { transform: scaleX(-1) scale(1); opacity: 1; }
    }

    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- ── INLINE SVG SYMBOLS ── -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- ROCK: detailed fist -->
    <symbol id="hand-rock" viewBox="0 0 120 120">
      <g fill="none" stroke="#d4c89a" stroke-linecap="round" stroke-linejoin="round">
        <!-- palm base -->
        <path stroke-width="5" d="M28 70 Q24 58 26 48 Q28 36 38 36 Q44 36 46 42"/>
        <!-- index knuckle -->
        <path stroke-width="5" d="M46 42 Q46 32 54 30 Q62 28 64 36 L66 50"/>
        <!-- middle knuckle -->
        <path stroke-width="5" d="M64 36 Q64 26 72 25 Q80 24 80 34 L80 50"/>
        <!-- ring knuckle -->
        <path stroke-width="5" d="M80 34 Q82 24 88 26 Q94 28 92 40 L90 52"/>
        <!-- palm body -->
        <path stroke-width="5" d="M26 70 L28 88 Q30 96 40 96 L82 96 Q92 96 92 86 L92 56 Q92 50 86 48 L68 46 Q60 44 50 46 L38 50 Q28 54 28 66 Z"/>
        <!-- thumb -->
        <path stroke-width="4.5" d="M28 66 Q20 66 18 58 Q16 50 22 46 Q28 42 34 48 L38 54"/>
        <!-- finger crease lines -->
        <path stroke-width="2" stroke-opacity="0.4" d="M40 68 Q55 65 70 66 Q80 67 88 66"/>
        <path stroke-width="2" stroke-opacity="0.4" d="M38 76 Q55 73 72 74 Q82 75 90 74"/>
      </g>
    </symbol>

    <!-- PAPER: open flat hand -->
    <symbol id="hand-paper" viewBox="0 0 120 120">
      <g fill="none" stroke="#d4c89a" stroke-linecap="round" stroke-linejoin="round">
        <!-- pinky -->
        <path stroke-width="4.5" d="M88 72 L88 40 Q88 30 82 28 Q76 26 74 32 L72 72"/>
        <!-- ring -->
        <path stroke-width="4.5" d="M72 72 L70 30 Q70 20 64 18 Q58 16 56 24 L54 72"/>
        <!-- middle -->
        <path stroke-width="4.5" d="M54 72 L52 26 Q52 16 46 14 Q40 12 38 20 L36 72"/>
        <!-- index -->
        <path stroke-width="4.5" d="M36 72 L36 34 Q36 24 30 22 Q24 20 22 28 L22 72"/>
        <!-- palm -->
        <path stroke-width="5" d="M22 72 L22 90 Q22 100 32 100 L80 100 Q90 100 90 90 L90 72 Z"/>
        <!-- thumb -->
        <path stroke-width="4.5" d="M22 76 Q12 76 10 66 Q8 56 16 52 Q22 48 28 54 L30 62"/>
        <!-- knuckle lines -->
        <line stroke-width="2" stroke-opacity="0.35" x1="26" y1="72" x2="26" y2="66"/>
        <line stroke-width="2" stroke-opacity="0.35" x1="44" y1="72" x2="44" y2="66"/>
        <line stroke-width="2" stroke-opacity="0.35" x1="62" y1="72" x2="62" y2="66"/>
        <line stroke-width="2" stroke-opacity="0.35" x1="80" y1="72" x2="80" y2="66"/>
      </g>
    </symbol>

    <!-- SCISSORS: two fingers extended, spread -->
    <symbol id="hand-scissors" viewBox="0 0 120 120">
      <g fill="none" stroke="#d4c89a" stroke-linecap="round" stroke-linejoin="round">
        <!-- index finger extended -->
        <path stroke-width="4.5" d="M36 72 L32 28 Q30 18 38 16 Q46 14 48 24 L50 72"/>
        <!-- middle finger extended, spread apart -->
        <path stroke-width="4.5" d="M50 72 L58 26 Q60 16 68 18 Q76 20 74 30 L68 72"/>
        <!-- ring curled -->
        <path stroke-width="4.5" d="M68 72 Q78 60 84 64 L86 72"/>
        <!-- pinky curled -->
        <path stroke-width="4.5" d="M86 72 Q92 64 94 68 L94 72"/>
        <!-- palm -->
        <path stroke-width="5" d="M34 72 L32 90 Q32 100 42 100 L86 100 Q96 100 96 90 L96 72 Z"/>
        <!-- thumb -->
        <path stroke-width="4.5" d="M34 76 Q24 76 20 66 Q16 56 24 52 Q30 48 36 56 L38 64"/>
        <!-- scissor gap line -->
        <path stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="3,3" d="M43 50 L58 38"/>
      </g>
    </symbol>

    <!-- WAIT: loose fist (resting) -->
    <symbol id="hand-wait" viewBox="0 0 120 120">
      <g fill="none" stroke="#333" stroke-linecap="round" stroke-linejoin="round">
        <path stroke-width="4.5" d="M30 68 Q26 56 28 46 Q30 36 40 36 Q46 36 48 42 Q48 34 56 32 Q64 30 66 38 L68 50 Q68 28 76 27 Q84 26 84 36 L84 52 Q86 26 92 28 Q98 30 96 42 L94 54"/>
        <path stroke-width="5" d="M28 70 L30 88 Q32 96 42 96 L84 96 Q94 96 94 86 L94 56 Q94 50 88 48 L70 46 Q62 44 52 46 L40 50 Q30 54 30 66 Z"/>
        <path stroke-width="4" d="M30 66 Q22 66 20 58 Q18 50 24 46 Q30 42 36 48 L40 54"/>
      </g>
    </symbol>

  </defs>
</svg>

<!-- ══ MATCH WINNER OVERLAY ══ -->
<div id="overlay">
  <div class="overlay-box">
    <div class="ov-crown" id="ov-crown">🏆</div>
    <div class="ov-title" id="ov-title">YOU WIN!</div>
    <div class="ov-sub" id="ov-sub">MATCH COMPLETE</div>
    <div class="ov-score" id="ov-score">5 – 2</div>
    <button class="ov-btn" onclick="newMatch()">PLAY AGAIN</button>
  </div>
</div>

<!-- ══ LOGIN PAGE ══ -->
<div class="page" id="login-page">
  <div class="login-header">
    <div class="login-badge">CLASSIC ARCADE</div>
    <h1 class="login-title">ROCK<br/><span>PAPER</span><br/>SCISSORS</h1>
  </div>
  <div class="login-hands-preview">
    <div class="h-wrap"><svg><use href="#hand-rock"/></svg></div>
    <div class="h-wrap"><svg><use href="#hand-paper"/></svg></div>
    <div class="h-wrap"><svg><use href="#hand-scissors"/></svg></div>
  </div>
  <div class="login-card">
    <label class="field-label" for="name-input">Enter your name</label>
    <input class="name-input" id="name-input" type="text" placeholder="e.g. Alex" maxlength="18" autocomplete="off"/>
    <button class="start-btn" onclick="startGame()">START GAME</button>
    <p class="error-msg" id="error-msg"></p>
  </div>
</div>

<!-- ══ GAME PAGE ══ -->
<div class="page" id="game-page">
  <div class="game-header">
    <span class="g-title">RPS ARENA</span>
    <button class="back-btn" onclick="goBack()">← CHANGE NAME</button>
  </div>

  <!-- Match pips (best of 5 = first to 5 wins) -->
  <div class="match-row">
    <span class="match-label" id="pip-player-label">YOU</span>
    <div class="pips" id="pips-player">
      <div class="pip"></div><div class="pip"></div><div class="pip"></div>
      <div class="pip"></div><div class="pip"></div>
    </div>
    <span class="round-info" id="round-info">RND 1</span>
    <div class="pips" id="pips-bot">
      <div class="pip"></div><div class="pip"></div><div class="pip"></div>
      <div class="pip"></div><div class="pip"></div>
    </div>
    <span class="match-label">BOT</span>
  </div>

  <!-- Score strip -->
  <div class="score-strip">
    <div class="s-side">
      <div class="s-name" id="score-player-label">YOU</div>
      <div class="s-val" id="p-score">0</div>
    </div>
    <div class="s-sep">VS</div>
    <div class="s-side">
      <div class="s-name">BOT</div>
      <div class="s-val" id="b-score">0</div>
    </div>
  </div>

  <!-- Arena -->
  <div class="arena">
    <div class="a-side">
      <div class="a-label" id="arena-player-label">YOU</div>
      <div class="hand-wrap" id="p-display">
        <svg class="wait-svg"><use href="#hand-wait"/></svg>
      </div>
    </div>
    <div class="vs-col">
      <div class="vs-text">VS</div>
    </div>
    <div class="a-side bot-side">
      <div class="a-label">BOT</div>
      <div class="hand-wrap" id="b-display">
        <svg class="wait-svg" style="transform:scaleX(-1)"><use href="#hand-wait"/></svg>
      </div>
    </div>
  </div>

  <div class="result-msg" id="result">CHOOSE YOUR MOVE</div>

  <!-- Buttons -->
  <div class="choices">
    <button class="choice-btn" onclick="play('rock')">
      <svg><use href="#hand-rock"/></svg>
      <span class="c-name">Rock</span>
    </button>
    <button class="choice-btn" onclick="play('paper')">
      <svg><use href="#hand-paper"/></svg>
      <span class="c-name">Paper</span>
    </button>
    <button class="choice-btn" onclick="play('scissors')">
      <svg><use href="#hand-scissors"/></svg>
      <span class="c-name">Scissors</span>
    </button>
  </div>

  <button class="reset-btn" onclick="resetMatch()">RESET MATCH</button>
</div>

<script>
  const WIN_COUNT = 5;
  const beats = { rock:'scissors', paper:'rock', scissors:'paper' };
  const icons = { rock:'#hand-rock', paper:'#hand-paper', scissors:'#hand-scissors', wait:'#hand-wait' };

  const winMsgs  = ['YOU WIN!', 'NICE ONE!', 'CRUSHED IT!', 'FLAWLESS!', 'ON FIRE!'];
  const loseMsgs = ['BOT WINS!', 'OUCH!', 'CLOSE ONE!', 'TRY AGAIN!', 'GOT REKT!'];
  const drawMsgs = ['DRAW!', 'SAME BRAIN!', 'TIE GAME!', 'NO WINNER!'];

  let playerName = '';
  let scores = { p:0, b:0, d:0 };
  let round  = 1;
  let playing = false;

  function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

  function setHand(id, key, isBot) {
    const el = document.getElementById(id);
    const flipStyle = isBot ? 'style="transform:scaleX(-1)"' : '';
    el.innerHTML = `<svg ${flipStyle}><use href="${icons[key]}"/></svg>`;
  }

  function updatePips() {
    const pp = document.querySelectorAll('#pips-player .pip');
    const pb = document.querySelectorAll('#pips-bot .pip');
    pp.forEach((p,i) => { p.classList.toggle('won-p', i < scores.p); });
    pb.forEach((p,i) => { p.classList.toggle('won-b', i < scores.b); });
  }

  /* ── Login ── */
  function startGame() {
    const input = document.getElementById('name-input');
    const name  = input.value.trim();
    const err   = document.getElementById('error-msg');
    if (!name) { err.textContent = 'Please enter your name to continue.'; input.focus(); return; }
    err.textContent = '';
    playerName = name.toUpperCase();
    document.getElementById('pip-player-label').textContent   = playerName;
    document.getElementById('score-player-label').textContent = playerName;
    document.getElementById('arena-player-label').textContent = playerName;
    document.getElementById('login-page').style.display = 'none';
    const gp = document.getElementById('game-page');
    gp.style.display = 'block';
    gp.classList.add('fade-in');
  }

  document.getElementById('name-input').addEventListener('keydown', e => { if(e.key==='Enter') startGame(); });

  function goBack() {
    document.getElementById('game-page').style.display = 'none';
    document.getElementById('login-page').style.display = 'block';
    document.getElementById('name-input').value = '';
    resetMatch();
  }

  /* ── Play ── */
  function play(choice) {
    if (playing) return;
    playing = true;

    const bot = rand(['rock','paper','scissors']);

    // show wait + shake
    setHand('p-display', 'wait', false);
    setHand('b-display', 'wait', true);

    const pSvg = document.querySelector('#p-display svg');
    const bSvg = document.querySelector('#b-display svg');
    if (pSvg) { pSvg.classList.remove('shake'); void pSvg.offsetWidth; pSvg.classList.add('shake'); }
    if (bSvg) { bSvg.classList.remove('bot-shake'); void bSvg.offsetWidth; bSvg.classList.add('bot-shake'); }

    setTimeout(() => {
      setHand('p-display', choice, false);
      setHand('b-display', bot, true);

      const pNew = document.querySelector('#p-display svg');
      const bNew = document.querySelector('#b-display svg');
      if (pNew) pNew.classList.add('reveal-pop');
      if (bNew) bNew.classList.add('bot-reveal-pop');

      const res = document.getElementById('result');

      if (choice === bot) {
        scores.d++;
        res.className = 'result-msg draw';
        res.textContent = rand(drawMsgs) + ' — ' + choice.toUpperCase();
      } else if (beats[choice] === bot) {
        scores.p++;
        res.className = 'result-msg win';
        res.textContent = rand(winMsgs) + ' — ' + choice + ' beats ' + bot;
      } else {
        scores.b++;
        res.className = 'result-msg lose';
        res.textContent = rand(loseMsgs) + ' — ' + bot + ' beats ' + choice;
      }

      document.getElementById('p-score').textContent   = scores.p;
      document.getElementById('b-score').textContent   = scores.b;
      document.getElementById('round-info').textContent = 'RND ' + (++round);
      updatePips();

      // check match winner
      if (scores.p >= WIN_COUNT || scores.b >= WIN_COUNT) {
        setTimeout(() => showMatchOver(), 600);
      }

      playing = false;
    }, 500);
  }

  /* ── Match Over ── */
  function showMatchOver() {
    const playerWon = scores.p >= WIN_COUNT;
    const crown  = document.getElementById('ov-crown');
    const title  = document.getElementById('ov-title');
    const sub    = document.getElementById('ov-sub');
    const score  = document.getElementById('ov-score');

    crown.textContent = playerWon ? '🏆' : '🤖';
    title.textContent = playerWon ? playerName + ' WINS!' : 'BOT WINS!';
    title.className   = 'ov-title ' + (playerWon ? 'p-win' : 'b-win');
    sub.textContent   = 'MATCH COMPLETE — FIRST TO ' + WIN_COUNT;
    score.textContent = scores.p + ' – ' + scores.b;

    document.getElementById('overlay').classList.add('show');
  }

  /* ── New Match (after overlay) ── */
  function newMatch() {
    document.getElementById('overlay').classList.remove('show');
    resetMatch();
  }

  /* ── Reset ── */
  function resetMatch() {
    scores  = { p:0, b:0, d:0 };
    round   = 1;
    playing = false;
    document.getElementById('p-score').textContent    = 0;
    document.getElementById('b-score').textContent    = 0;
    document.getElementById('round-info').textContent = 'RND 1';
    setHand('p-display', 'wait', false);
    setHand('b-display', 'wait', true);
    const res = document.getElementById('result');
    res.className   = 'result-msg';
    res.textContent = 'CHOOSE YOUR MOVE';
    updatePips();
  }
</script>
</body>
</html>
